<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fraud Detection</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 420px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .title {
            font-weight: bold;
            text-align: center;
        }

        .result-box {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
        }

        .safe {
            background: #d1fae5;
            color: #065f46;
        }

        .fraud {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>

<body>

    <div class="card p-4 bg-white">

        <h3 class="title mb-3">Credit Card Fraud Detection System</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Merchant Id:</label>
                <input type="number" step="0.01" class="form-control" name="merchant_id" required>
            </div>


            <div class="mb-3">
                <label class="form-label"> Transaction Type:</label>

                <select name="transaction_type">
                    <option value="normal">Normal</option>
                    <option value="refund">Refund</option>
                </select>
            </div>


            <div class="mb-3">
                <label class="form-label">Amount:</label>

                <input type="number" step="0.01" class="form-control" name="amount"
                    placeholder="Enter transaction amount" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Hour</label>
                <input type="number" class="form-control" name="hour" placeholder="0 - 23" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Day</label>
                <input type="text" class="form-control" name="day" placeholder="e.g. monday" required>
            </div>

            <div class="mb-3">
                <label class="form-label"> Location:</label>
                <select name="location">
                    <option value="Dallas">Dallas</option>
                    <option value="Houston">Houston</option>
                    <option value="Los Angeles">Los Angeles</option>
                    <option value="New York">New York</option>
                    <option value="Philadelphia">Philadelphia</option>
                    <option value="Phoenix">Phoenix</option>
                    <option value="San Antonio">San Antonio</option>
                    <option value="San Diego">San Diego</option>
                    <option value="San Jose">San Jose</option>
                </select>
            </div>

            <button class="btn btn-dark w-100">Predict</button>
        </form>

        {% if result is not None %}
        {% if result == 1 %}
        <div class="result-box fraud mt-3">
             Fraud Transaction Detected
        </div>
        {% else %}
        <div class="result-box safe mt-3">
             Transaction is Safe
        </div>
        {% endif %}
        {% endif %}

    </div>

</body>

</html>
