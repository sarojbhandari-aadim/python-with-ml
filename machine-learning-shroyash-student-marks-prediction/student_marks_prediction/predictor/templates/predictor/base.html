<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Marks Prediction</title>
  {% load static %}
  <style>
    :root {
      --bg: #0d0d11;
      --surface: #15151c;
      --surface2: #1d1d27;
      --border: #2a2a3a;
      --text: #e8e0d5;
      --muted: #888;
      --accent: #4fc3f7;
      --green: #66bb6a;
      --amber: #ffa726;
      --red: #ef5350;
      --font: 'JetBrains Mono', 'Fira Code', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 56px; }
    nav .logo { font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: -0.5px; }
    nav a { color: var(--muted); font-size: 13px; text-decoration: none; transition: color 0.2s; }
    nav a:hover { color: var(--text); }

    main { max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1.25rem; }

    input[type="number"], input[type="text"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 10px 12px; font-family: var(--font);
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }

    button, .btn {
      background: var(--accent); color: #000; border: none; border-radius: 8px;
      padding: 12px 20px; font-family: var(--font); font-size: 14px; font-weight: 600;
      cursor: pointer; width: 100%; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }

    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; margin-top: 1rem; }
    .hint { font-size: 11px; color: #555; margin-top: 4px; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav>
    <span class="logo">📊 marks.predict</span>
    <a href="{% url 'index' %}">Predict</a>

  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
