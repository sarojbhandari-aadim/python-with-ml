<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Rent Predictor</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c5282;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #4a5568;
        }
        input, select {
            padding: 10px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 15px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #4299e1;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #2b6cb0;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2c5282;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #ebf8ff;
            border-left: 5px solid #38b2ac;
            border-radius: 8px;
            text-align: center;
        }
        .result-box h2 {
            color: #2c7a7b;
            margin: 0 0 8px;
        }
        .rent-amount {
            font-size: 36px;
            font-weight: 700;
            color: #276749;
        }
        .error-box {
            margin-top: 20px;
            padding: 15px;
            background: #fff5f5;
            border-left: 4px solid #fc8181;
            border-radius: 8px;
            color: #c53030;
        }
    </style>
</head>
<body>
<div class="container">

    <h1>House Rent Predictor</h1>
    <p class="subtitle">Enter property details to estimate monthly rent</p>

    <form method="post" action="">
        {% csrf_token %}

        <div class="form-row">
            <div class="form-group">
                <label for="bhk">Number of BHK</label>
                <input type="number" id="bhk" name="bhk" min="1" max="10" value="2" required>
            </div>
            <div class="form-group">
                <label for="size">Size (sq ft)</label>
                <input type="number" id="size" name="size" min="100" max="10000" value="1000" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="bathroom">Bathrooms</label>
                <input type="number" id="bathroom" name="bathroom" min="1" max="10" value="2" required>
            </div>
            <div class="form-group">
                <label for="city">City</label>
                <select id="city" name="city" required>
                    {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="area_type">Area Type</label>
                <select id="area_type" name="area_type" required>
                    {% for at in area_types %}
                        <option value="{{ at }}">{{ at }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="furnishing_status">Furnishing Status</label>
                <select id="furnishing_status" name="furnishing_status" required>
                    {% for f in furnishings %}
                        <option value="{{ f }}">{{ f }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="tenant_preferred">Tenant Preferred</label>
                <select id="tenant_preferred" name="tenant_preferred" required>
                    {% for t in tenants %}
                        <option value="{{ t }}">{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="point_of_contact">Point of Contact</label>
                <select id="point_of_contact" name="point_of_contact" required>
                    {% for c in contacts %}
                        <option value="{{ c }}">{{ c }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="posted_year">Year</label>
                <input type="number" id="posted_year" name="posted_year" min="2020" max="2030" value="2022" required>
            </div>
            <div class="form-group">
                <label for="posted_month">Month (1-12)</label>
                <input type="number" id="posted_month" name="posted_month" min="1" max="12" value="6" required>
            </div>
        </div>

        <button type="submit">Predict Rent</button>

    </form>

    {% if prediction %}
        <div class="result-box">
            <h2>Estimated Monthly Rent</h2>
            <div class="rent-amount">Rs. {{ prediction }}</div>
            <p style="color:#4a5568; margin-top:8px;">Based on your property details</p>
        </div>
    {% endif %}

    {% if error %}
        <div class="error-box">
            <strong>Error:</strong> {{ error }}
        </div>
    {% endif %}

</div>
</body>
</html>
