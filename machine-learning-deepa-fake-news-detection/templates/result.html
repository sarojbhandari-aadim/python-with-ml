<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result - Fake News Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            text-align: center;
        }
        .result {
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            color: {{ color }};
        }
        .news-text {
            background-color: white;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
            max-height: 200px;
            overflow-y: auto;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background-color: #008CBA;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
        }
        a:hover {
            background-color: #007ba7;
        }
    </style>
</head>
<body>
    <h1> Fake News Detector - Result</h1>
    
    <div class="result">
        {{ result }}
    </div>

    <h3>Your Input:</h3>
    <div class="news-text">
        {{ news_text }}
    </div>

    <a href="/">← Check Another News</a>
</body>
</html>
