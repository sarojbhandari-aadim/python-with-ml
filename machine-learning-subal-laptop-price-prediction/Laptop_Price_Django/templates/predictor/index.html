<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Price Prediction System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 30px; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; font-size: 28px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #34495e; }
        input, select { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
        input:focus, select:focus { outline: none; border-color: #3498db; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        button { width: 100%; padding: 14px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:hover { background: #2980b9; }
        .result { margin-top: 24px; padding: 20px; background: #eaf6ff; border-left: 5px solid #3498db; border-radius: 8px; text-align: center; }
        .result h2 { color: #2c3e50; font-size: 22px; }
        .result span { font-size: 32px; font-weight: bold; color: #3498db; }
        .section-title { font-size: 16px; font-weight: 700; color: #3498db; margin: 24px 0 12px; border-bottom: 2px solid #eaf6ff; padding-bottom: 6px; }
    </style>
</head>
<body>
<div class="container">
    <h1>💻 Laptop Price Prediction System</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="section-title">🔧 Basic Specs</div>
        <div class="row">
            <div class="form-group">
                <label>RAM (GB)</label>
                <input type="number" name="ram" placeholder="e.g. 8" required>
            </div>
            <div class="form-group">
                <label>Weight (kg)</label>
                <input type="number" step="0.01" name="weight" placeholder="e.g. 1.5" required>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Operating System</label>
                <select name="opsys">
                    <option value="0">Windows</option>
                    <option value="1">macOS</option>
                    <option value="2">Linux</option>
                    <option value="3">Chrome OS</option>
                    <option value="4">No OS</option>
                </select>
            </div>
            <div class="form-group">
                <label>Memory Size (GB)</label>
                <input type="number" name="memory_size" placeholder="e.g. 512" required>
            </div>
        </div>

        <div class="section-title">🏷️ Brand & Type</div>
        <div class="row">
            <div class="form-group">
                <label>Brand</label>
                <select name="brand">
                    <option value="Acer">Acer</option>
                    <option value="Apple">Apple</option>
                    <option value="Asus">Asus</option>
                    <option value="Chuwi">Chuwi</option>
                    <option value="Dell">Dell</option>
                    <option value="Fujitsu">Fujitsu</option>
                    <option value="Google">Google</option>
                    <option value="HP">HP</option>
                    <option value="Huawei">Huawei</option>
                    <option value="LG">LG</option>
                    <option value="Lenovo">Lenovo</option>
                    <option value="MSI">MSI</option>
                    <option value="Mediacom">Mediacom</option>
                    <option value="Microsoft">Microsoft</option>
                    <option value="Razer">Razer</option>
                    <option value="Samsung">Samsung</option>
                    <option value="Toshiba">Toshiba</option>
                    <option value="Vero">Vero</option>
                    <option value="Xiaomi">Xiaomi</option>
                </select>
            </div>
            <div class="form-group">
                <label>Laptop Type</label>
                <select name="laptop_type">
                    <option value="2 in 1 Convertible">2 in 1 Convertible</option>
                    <option value="Gaming">Gaming</option>
                    <option value="Netbook">Netbook</option>
                    <option value="Notebook">Notebook</option>
                    <option value="Ultrabook">Ultrabook</option>
                    <option value="Workstation">Workstation</option>
                </select>
            </div>
        </div>

        <div class="section-title">🖥️ Display</div>
        <div class="row">
            <div class="form-group">
                <label>Touchscreen</label>
                <select name="touchscreen">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>
            <div class="form-group">
                <label>IPS Display</label>
                <select name="ips">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>PPI (Pixels Per Inch)</label>
            <input type="number" step="0.01" name="ppi" placeholder="e.g. 141.21" required>
        </div>

        <div class="section-title">⚙️ Processor & GPU</div>
        <div class="row">
            <div class="form-group">
                <label>CPU Brand</label>
                <select name="cpu_brand">
                    <option value="0">Intel</option>
                    <option value="1">AMD</option>
                    <option value="2">Samsung</option>
                </select>
            </div>
            <div class="form-group">
                <label>CPU Frequency (GHz)</label>
                <input type="number" step="0.1" name="cpu_frequency" placeholder="e.g. 2.5" required>
            </div>
        </div>
        <div class="form-group">
            <label>GPU Brand</label>
            <select name="gpu_brand">
                <option value="0">Intel</option>
                <option value="1">Nvidia</option>
                <option value="2">AMD</option>
                <option value="3">ARM</option>
            </select>
        </div>

        <div class="section-title">💾 Storage</div>
        <div class="row">
            <div class="form-group">
                <label>SSD (GB)</label>
                <input type="number" name="ssd" placeholder="e.g. 256" required>
            </div>
            <div class="form-group">
                <label>HDD (GB)</label>
                <input type="number" name="hdd" placeholder="e.g. 1000" required>
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label>Flash Storage (GB)</label>
                <input type="number" name="flash_storage" placeholder="e.g. 0" required>
            </div>
            <div class="form-group">
                <label>Hybrid (GB)</label>
                <input type="number" name="hybrid" placeholder="e.g. 0" required>
            </div>
        </div>

        <button type="submit">🔍 Predict Price</button>
    </form>

    {% if prediction is not None %}
    <div class="result">
        <h2>Predicted Laptop Price</h2>
        <span>NPR {{ prediction }}</span>
    </div>
    {% endif %}

</div>
</body>
</html>
